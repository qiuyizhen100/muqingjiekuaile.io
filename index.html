<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>妈妈，母亲节快乐 🌸</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&family=Ma+Shan+Zheng&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --pink-deep: #c2185b;
      --pink-mid: #e91e8c;
      --pink-light: #f8bbd0;
      --pink-pale: #fce4ec;
      --gold: #f9a825;
      --white: #fff;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #fce4ec 0%, #f8bbd0 30%, #ffd6e0 60%, #fff0f6 100%);
      font-family: 'Noto Serif SC', 'Ma Shan Zheng', serif;
      overflow-x: hidden;
      position: relative;
    }

    /* ===== 飘落花瓣 ===== */
    .petals-container {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 0;
      overflow: hidden;
    }
    .petal {
      position: absolute;
      top: -60px;
      animation: fall linear infinite;
      opacity: 0.75;
      font-size: 1.4rem;
      filter: drop-shadow(0 2px 4px rgba(194,24,91,0.2));
    }

    @keyframes fall {
      0%   { transform: translateY(0) rotateZ(0deg) translateX(0); opacity: 0.8; }
      50%  { transform: translateY(50vh) rotateZ(180deg) translateX(40px); }
      100% { transform: translateY(110vh) rotateZ(360deg) translateX(-20px); opacity: 0.2; }
    }

    /* ===== 主容器 ===== */
    .main-wrapper {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 20px 120px;
      min-height: 100vh;
    }

    /* ===== 标题区域 ===== */
    .header-section {
      text-align: center;
      margin-bottom: 36px;
      animation: fadeInDown 1.2s ease both;
    }

    .tag-line {
      font-size: 0.95rem;
      color: var(--pink-deep);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 12px;
      opacity: 0.8;
    }

    .main-title {
      font-size: clamp(2.2rem, 7vw, 4.5rem);
      color: var(--pink-deep);
      line-height: 1.2;
      text-shadow: 0 3px 12px rgba(194,24,91,0.18);
      font-weight: 700;
    }

    .main-title span {
      display: inline-block;
      background: linear-gradient(135deg, #c2185b, #f06292, #e91e8c);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: shimmer 3s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { filter: brightness(1); }
      50%       { filter: brightness(1.3); }
    }

    .subtitle {
      font-size: 1.1rem;
      color: #ad1457;
      margin-top: 10px;
      letter-spacing: 0.12em;
      opacity: 0.85;
    }

    /* ===== 中央花朵 ===== */
    .flower-container {
      position: relative;
      width: 220px;
      height: 220px;
      margin: 10px 0 30px;
      animation: floatUp 3s ease-in-out infinite;
    }

    @keyframes floatUp {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-14px); }
    }

    .flower {
      width: 100%; height: 100%;
      position: relative;
    }

    .petal-svg {
      position: absolute;
      top: 50%; left: 50%;
      transform-origin: 50% 100%;
      width: 80px; height: 110px;
      margin-left: -40px;
      margin-top: -110px;
    }

    .flower-center {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 56px; height: 56px;
      border-radius: 50%;
      background: radial-gradient(circle, #fff9c4, #f9a825);
      box-shadow: 0 0 20px 6px rgba(249,168,37,0.45);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.6rem;
      animation: pulse 2s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { box-shadow: 0 0 20px 6px rgba(249,168,37,0.45); }
      50%       { box-shadow: 0 0 32px 14px rgba(249,168,37,0.65); }
    }

    /* ===== 消息卡片 ===== */
    .card {
      background: rgba(255,255,255,0.85);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 36px 40px;
      max-width: 560px;
      width: 100%;
      box-shadow: 0 8px 40px rgba(194,24,91,0.12), 0 2px 8px rgba(0,0,0,0.06);
      border: 1.5px solid rgba(248,187,208,0.6);
      animation: fadeInUp 1.4s ease 0.3s both;
      position: relative;
      overflow: hidden;
    }

    .card::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 120px; height: 120px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(248,187,208,0.5), transparent);
    }

    .card-icon {
      font-size: 2.2rem;
      margin-bottom: 16px;
      display: block;
      text-align: center;
    }

    .card h2 {
      font-size: 1.5rem;
      color: var(--pink-deep);
      margin-bottom: 16px;
      text-align: center;
      font-weight: 700;
    }

    .card p {
      font-size: 1.05rem;
      color: #4a2040;
      line-height: 2;
      text-align: center;
    }

    .card .signature {
      margin-top: 22px;
      font-size: 1rem;
      color: var(--pink-mid);
      text-align: right;
      font-style: italic;
      letter-spacing: 0.08em;
    }

    /* ===== 爱心装饰 ===== */
    .hearts-row {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin: 24px 0;
      animation: fadeIn 1.6s ease 0.8s both;
    }

    .heart-icon {
      font-size: 1.8rem;
      animation: heartbeat 1.4s ease-in-out infinite;
    }

    .heart-icon:nth-child(2) { animation-delay: 0.2s; }
    .heart-icon:nth-child(3) { animation-delay: 0.4s; }
    .heart-icon:nth-child(4) { animation-delay: 0.6s; }
    .heart-icon:nth-child(5) { animation-delay: 0.8s; }

    @keyframes heartbeat {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.3); }
    }

    /* ===== 音乐播放器 ===== */
    .music-player {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      background: rgba(255,255,255,0.92);
      backdrop-filter: blur(14px);
      border-radius: 60px;
      padding: 14px 28px;
      display: flex;
      align-items: center;
      gap: 16px;
      box-shadow: 0 8px 32px rgba(194,24,91,0.18), 0 2px 8px rgba(0,0,0,0.08);
      border: 1.5px solid rgba(248,187,208,0.7);
      z-index: 100;
      animation: slideUp 1s ease 1s both;
      min-width: 300px;
    }

    @keyframes slideUp {
      from { transform: translateX(-50%) translateY(80px); opacity: 0; }
      to   { transform: translateX(-50%) translateY(0); opacity: 1; }
    }

    .music-note {
      font-size: 1.6rem;
      animation: spin 4s linear infinite;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to   { transform: rotate(360deg); }
    }

    .music-note.paused { animation-play-state: paused; }

    .music-info {
      flex: 1;
    }

    .music-title {
      font-size: 0.9rem;
      font-weight: 700;
      color: var(--pink-deep);
      white-space: nowrap;
    }

    .music-artist {
      font-size: 0.75rem;
      color: #999;
      margin-top: 2px;
    }

    .play-btn {
      width: 44px; height: 44px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #e91e8c, #c2185b);
      color: white;
      font-size: 1.2rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 4px 14px rgba(194,24,91,0.35);
      flex-shrink: 0;
    }

    .play-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 6px 20px rgba(194,24,91,0.5);
    }

    .progress-bar-wrap {
      flex: 1;
      height: 4px;
      background: var(--pink-light);
      border-radius: 2px;
      overflow: hidden;
      cursor: pointer;
      min-width: 60px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, #e91e8c, #f06292);
      width: 0%;
      border-radius: 2px;
      transition: width 0.5s linear;
    }

    /* ===== 动画关键帧 ===== */
    @keyframes fadeInDown {
      from { opacity: 0; transform: translateY(-30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }

    /* ===== 蜡烛效果 ===== */
    .candles-row {
      display: flex;
      gap: 18px;
      justify-content: center;
      margin: 20px 0 10px;
      animation: fadeIn 2s ease 1s both;
    }

    .candle {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0;
    }

    .flame {
      font-size: 1.4rem;
      animation: flicker 0.8s ease-in-out infinite alternate;
    }

    .candle:nth-child(2) .flame { animation-delay: 0.2s; }
    .candle:nth-child(3) .flame { animation-delay: 0.4s; }

    @keyframes flicker {
      from { transform: scaleY(1) scaleX(1); opacity: 1; }
      to   { transform: scaleY(1.15) scaleX(0.92); opacity: 0.85; }
    }

    .candle-body {
      font-size: 1.5rem;
    }

    /* ===== 响应式 ===== */
    @media (max-width: 480px) {
      .card { padding: 28px 22px; }
      .music-player { min-width: 88vw; padding: 12px 18px; }
    }
  </style>
</head>
<body>

<!-- 飘落花瓣 -->
<div class="petals-container" id="petals"></div>

<!-- 主体 -->
<div class="main-wrapper">

  <!-- 标题 -->
  <div class="header-section">
    <div class="tag-line">✦ 送给世界上最好的妈妈 ✦</div>
    <h1 class="main-title"><span>妈妈，母亲节快乐</span></h1>
    <div class="subtitle">Happy Mother's Day 🌸</div>
  </div>

  <!-- 大花朵SVG -->
  <div class="flower-container">
    <svg class="flower" viewBox="0 0 220 220" xmlns="http://www.w3.org/2000/svg">
      <!-- 8片花瓣 -->
      <g transform="translate(110,110)">
        <ellipse cx="0" cy="-62" rx="22" ry="44" fill="#f48fb1" opacity="0.9" transform="rotate(0)"/>
        <ellipse cx="0" cy="-62" rx="22" ry="44" fill="#f06292" opacity="0.85" transform="rotate(45)"/>
        <ellipse cx="0" cy="-62" rx="22" ry="44" fill="#ec407a" opacity="0.8" transform="rotate(90)"/>
        <ellipse cx="0" cy="-62" rx="22" ry="44" fill="#f48fb1" opacity="0.9" transform="rotate(135)"/>
        <ellipse cx="0" cy="-62" rx="22" ry="44" fill="#f06292" opacity="0.85" transform="rotate(180)"/>
        <ellipse cx="0" cy="-62" rx="22" ry="44" fill="#ec407a" opacity="0.8" transform="rotate(225)"/>
        <ellipse cx="0" cy="-62" rx="22" ry="44" fill="#f48fb1" opacity="0.9" transform="rotate(270)"/>
        <ellipse cx="0" cy="-62" rx="22" ry="44" fill="#f06292" opacity="0.85" transform="rotate(315)"/>
        <!-- 花蕊 -->
        <circle cx="0" cy="0" r="30" fill="url(#goldGrad)"/>
        <circle cx="0" cy="0" r="22" fill="#ffe082"/>
        <text x="0" y="8" text-anchor="middle" font-size="20">💛</text>
      </g>
      <defs>
        <radialGradient id="goldGrad" cx="50%" cy="50%" r="50%">
          <stop offset="0%" stop-color="#fff9c4"/>
          <stop offset="100%" stop-color="#f9a825"/>
        </radialGradient>
      </defs>
    </svg>
  </div>

  <!-- 爱心排列 -->
  <div class="hearts-row">
    <span class="heart-icon">💗</span>
    <span class="heart-icon">💖</span>
    <span class="heart-icon">💝</span>
    <span class="heart-icon">💖</span>
    <span class="heart-icon">💗</span>
  </div>

  <!-- 祝福卡片 -->
  <div class="card">
    <span class="card-icon">🌹</span>
    <h2>亲爱的妈妈</h2>
    <p>
      感谢您在我生命中每一个平凡又珍贵的日子里，<br>
      给予我无尽的爱与包容。<br><br>
      您是我心中最温柔的港湾，<br>
      无论风雨，都是我最坚强的依靠。<br><br>
      <strong>母亲节快乐！</strong><br>
      愿您身体健康，笑口常开，<br>
      每一天都如春花般灿烂🌸
    </p>
    <div class="signature">——永远爱您的孩子 ❤️</div>
  </div>

  <!-- 蜡烛 -->
  <div class="candles-row">
    <div class="candle"><div class="flame">🔥</div><div class="candle-body">🕯️</div></div>
    <div class="candle"><div class="flame">🔥</div><div class="candle-body">🕯️</div></div>
    <div class="candle"><div class="flame">🔥</div><div class="candle-body">🕯️</div></div>
  </div>

</div>

<!-- 音乐播放器 -->
<div class="music-player" id="player">
  <div class="music-note" id="musicNote">🎵</div>
  <div class="music-info">
    <div class="music-title" id="trackTitle">母亲 — 阎维文</div>
    <div class="music-artist" id="trackArtist">点击播放 ♪</div>
  </div>
  <div class="progress-bar-wrap" id="progressWrap">
    <div class="progress-fill" id="progressFill"></div>
  </div>
  <button class="play-btn" id="playBtn" title="播放/暂停">▶</button>
</div>

<!-- 使用Web Audio API生成温柔背景音乐 -->
<script>
  // ===== 飘落花瓣 =====
  const petalEmojis = ['🌸','🌺','🌷','🌹','💮','🌼'];
  const container = document.getElementById('petals');
  const petalCount = 28;

  for (let i = 0; i < petalCount; i++) {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = petalEmojis[Math.floor(Math.random() * petalEmojis.length)];
    p.style.left = Math.random() * 100 + 'vw';
    p.style.fontSize = (0.9 + Math.random() * 1.2) + 'rem';
    p.style.animationDuration = (6 + Math.random() * 10) + 's';
    p.style.animationDelay = (-Math.random() * 12) + 's';
    container.appendChild(p);
  }

  // ===== Web Audio 背景音乐 =====
  let audioCtx = null;
  let masterGain = null;
  let isPlaying = false;
  let scheduledNodes = [];
  let progressInterval = null;
  let startTime = 0;
  let songDuration = 64; // 秒

  // 温柔的五声音阶旋律（以C大调为基础，母亲节风格）
  const melody = [
    // 小节 1-2: 引子
    { note: 'E4', time: 0,   dur: 0.8 },
    { note: 'G4', time: 0.8, dur: 0.4 },
    { note: 'A4', time: 1.2, dur: 1.2 },
    { note: 'G4', time: 2.4, dur: 0.6 },
    { note: 'E4', time: 3.0, dur: 0.6 },
    { note: 'D4', time: 3.6, dur: 1.2 },
    // 小节 3-4
    { note: 'C4', time: 5.0, dur: 0.8 },
    { note: 'E4', time: 5.8, dur: 0.6 },
    { note: 'G4', time: 6.4, dur: 0.8 },
    { note: 'A4', time: 7.2, dur: 0.8 },
    { note: 'G4', time: 8.0, dur: 1.6 },
    // 小节 5-6
    { note: 'E4', time: 9.6,  dur: 0.6 },
    { note: 'D4', time: 10.2, dur: 0.4 },
    { note: 'E4', time: 10.6, dur: 0.8 },
    { note: 'G4', time: 11.4, dur: 1.0 },
    { note: 'A4', time: 12.4, dur: 0.5 },
    { note: 'C5', time: 12.9, dur: 1.4 },
    // 小节 7-8: 高潮
    { note: 'B4', time: 14.4, dur: 0.6 },
    { note: 'A4', time: 15.0, dur: 0.6 },
    { note: 'G4', time: 15.6, dur: 0.8 },
    { note: 'E4', time: 16.4, dur: 0.6 },
    { note: 'D4', time: 17.0, dur: 1.0 },
    { note: 'C4', time: 18.0, dur: 1.6 },
    // 重复段 (偏移 20s)
    { note: 'E4', time: 20.0, dur: 0.8 },
    { note: 'G4', time: 20.8, dur: 0.4 },
    { note: 'A4', time: 21.2, dur: 1.2 },
    { note: 'G4', time: 22.4, dur: 0.6 },
    { note: 'E4', time: 23.0, dur: 0.6 },
    { note: 'D4', time: 23.6, dur: 1.2 },
    { note: 'C4', time: 25.0, dur: 0.8 },
    { note: 'E4', time: 25.8, dur: 0.6 },
    { note: 'G4', time: 26.4, dur: 0.8 },
    { note: 'A4', time: 27.2, dur: 0.8 },
    { note: 'G4', time: 28.0, dur: 1.6 },
    // 尾奏
    { note: 'E4', time: 30.0, dur: 0.6 },
    { note: 'G4', time: 30.6, dur: 0.6 },
    { note: 'A4', time: 31.2, dur: 0.8 },
    { note: 'C5', time: 32.0, dur: 1.2 },
    { note: 'A4', time: 33.2, dur: 0.6 },
    { note: 'G4', time: 33.8, dur: 0.8 },
    { note: 'E4', time: 34.6, dur: 1.0 },
    { note: 'D4', time: 35.6, dur: 0.6 },
    { note: 'C4', time: 36.2, dur: 2.0 },
  ];

  // 伴奏和弦（低音）
  const chords = [
    { notes: ['C3','G3'], time: 0,    dur: 4.0 },
    { notes: ['F3','C4'], time: 4.0,  dur: 4.0 },
    { notes: ['G3','D4'], time: 8.0,  dur: 4.0 },
    { notes: ['C3','G3'], time: 12.0, dur: 4.0 },
    { notes: ['F3','C4'], time: 16.0, dur: 4.0 },
    { notes: ['C3','G3'], time: 20.0, dur: 4.0 },
    { notes: ['F3','C4'], time: 24.0, dur: 4.0 },
    { notes: ['G3','D4'], time: 28.0, dur: 4.0 },
    { notes: ['F3','C4'], time: 32.0, dur: 4.0 },
    { notes: ['C3','G3'], time: 36.0, dur: 2.5 },
  ];

  const noteFreq = {
    'C3': 130.81, 'D3': 146.83, 'E3': 164.81, 'F3': 174.61,
    'G3': 196.00, 'A3': 220.00, 'B3': 246.94,
    'C4': 261.63, 'D4': 293.66, 'E4': 329.63, 'F4': 349.23,
    'G4': 392.00, 'A4': 440.00, 'B4': 493.88,
    'C5': 523.25, 'D5': 587.33,
  };

  function playNote(ctx, freq, startT, duration, gainVal, type = 'sine') {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = type;
    osc.frequency.setValueAtTime(freq, startT);
    gain.gain.setValueAtTime(0, startT);
    gain.gain.linearRampToValueAtTime(gainVal, startT + 0.05);
    gain.gain.setValueAtTime(gainVal, startT + duration - 0.08);
    gain.gain.linearRampToValueAtTime(0, startT + duration);
    osc.connect(gain);
    gain.connect(masterGain);
    osc.start(startT);
    osc.stop(startT + duration + 0.01);
    scheduledNodes.push(osc, gain);
    return osc;
  }

  function scheduleSong(ctx, offset) {
    // 旋律（钢琴音色用正弦波）
    melody.forEach(n => {
      const freq = noteFreq[n.note];
      if (!freq) return;
      playNote(ctx, freq, offset + n.time, n.dur, 0.22, 'sine');
      // 泛音
      playNote(ctx, freq * 2, offset + n.time, n.dur, 0.06, 'sine');
    });

    // 伴奏和弦（柔软的三角波）
    chords.forEach(c => {
      c.notes.forEach(noteName => {
        const freq = noteFreq[noteName];
        if (!freq) return;
        playNote(ctx, freq, offset + c.time, c.dur, 0.08, 'triangle');
      });
    });
  }

  function startMusic() {
    if (!audioCtx) {
      audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = audioCtx.createGain();
      masterGain.gain.setValueAtTime(0.7, audioCtx.currentTime);
      masterGain.connect(audioCtx.destination);
    }
    if (audioCtx.state === 'suspended') audioCtx.resume();
    startTime = audioCtx.currentTime;
    scheduleSong(audioCtx, startTime);
    isPlaying = true;
    updateUI();
    startProgress();
  }

  function stopMusic() {
    scheduledNodes.forEach(n => { try { n.stop(0); } catch(e) {} });
    scheduledNodes = [];
    isPlaying = false;
    clearInterval(progressInterval);
    document.getElementById('progressFill').style.width = '0%';
    updateUI();
  }

  function startProgress() {
    clearInterval(progressInterval);
    progressInterval = setInterval(() => {
      if (!audioCtx || !isPlaying) return;
      const elapsed = audioCtx.currentTime - startTime;
      const pct = Math.min((elapsed / songDuration) * 100, 100);
      document.getElementById('progressFill').style.width = pct + '%';
      if (elapsed >= songDuration) {
        stopMusic();
        setTimeout(startMusic, 1000); // 循环播放
      }
    }, 300);
  }

  function updateUI() {
    const btn = document.getElementById('playBtn');
    const note = document.getElementById('musicNote');
    const artist = document.getElementById('trackArtist');
    if (isPlaying) {
      btn.textContent = '⏸';
      note.classList.remove('paused');
      artist.textContent = '♪ 正在播放...';
    } else {
      btn.textContent = '▶';
      note.classList.add('paused');
      artist.textContent = '点击播放 ♪';
    }
  }

  document.getElementById('playBtn').addEventListener('click', () => {
    if (isPlaying) { stopMusic(); } else { startMusic(); }
  });

  // 点击进度条跳转
  document.getElementById('progressWrap').addEventListener('click', (e) => {
    if (!isPlaying || !audioCtx) return;
    const rect = e.currentTarget.getBoundingClientRect();
    const ratio = (e.clientX - rect.left) / rect.width;
    stopMusic();
    // 重新从指定位置播放
    startTime = audioCtx.currentTime - ratio * songDuration;
    scheduleSong(audioCtx, audioCtx.currentTime - ratio * songDuration);
    isPlaying = true;
    updateUI();
    startProgress();
  });

  // 花瓣持续生成
  setInterval(() => {
    const p = document.createElement('div');
    p.className = 'petal';
    p.textContent = petalEmojis[Math.floor(Math.random() * petalEmojis.length)];
    p.style.left = Math.random() * 100 + 'vw';
    p.style.fontSize = (0.9 + Math.random() * 1.1) + 'rem';
    p.style.animationDuration = (7 + Math.random() * 8) + 's';
    p.style.animationDelay = '0s';
    container.appendChild(p);
    setTimeout(() => p.remove(), 16000);
  }, 800);
</script>
</body>
</html>
